<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot demo loodgieter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Loodgieter Chatbot Demo</h1>
    <p>Stel een vraag zoals: prijs, openingsuren, regio, offerte of dringend lek.</p>

    <div id="chatbox" class="chatbox">
      <div class="bot">Hallo, ik ben de chatbot van de loodgieter. Hoe kan ik je helpen?</div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Typ je vraag...">
      <button onclick="sendMessage()">Verstuur</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
