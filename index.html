<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loodgieter Chatbot Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <h1>Loodgieter Chatbot Demo</h1>
    <p>Stel een vraag zoals: prijs, openingsuren, regio, offerte of dringend lek.</p>

    <div id="chatbox" class="chatbox"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Typ je vraag...">
      <button id="sendBtn" type="button">Verstuur</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
